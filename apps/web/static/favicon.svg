<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Journey path (winding road) -->
  <path d="M120 380 Q180 320 200 260 Q220 200 260 180 Q300 160 340 200 Q380 240 380 140"
        fill="none" stroke="url(#glow)" stroke-width="28" stroke-linecap="round" opacity="0.35"/>
  <!-- AI brain/circuit nodes -->
  <!-- Central node -->
  <circle cx="256" cy="230" r="44" fill="white" opacity="0.95"/>
  <circle cx="256" cy="230" r="28" fill="url(#bg)"/>
  <!-- Top node -->
  <circle cx="256" cy="120" r="22" fill="white" opacity="0.9"/>
  <circle cx="256" cy="120" r="13" fill="url(#bg)"/>
  <!-- Bottom-left node -->
  <circle cx="168" cy="320" r="22" fill="white" opacity="0.9"/>
  <circle cx="168" cy="320" r="13" fill="url(#bg)"/>
  <!-- Bottom-right node -->
  <circle cx="344" cy="320" r="22" fill="white" opacity="0.9"/>
  <circle cx="344" cy="320" r="13" fill="url(#bg)"/>
  <!-- Left node -->
  <circle cx="152" cy="200" r="18" fill="white" opacity="0.85"/>
  <circle cx="152" cy="200" r="10" fill="url(#bg)"/>
  <!-- Right node -->
  <circle cx="360" cy="200" r="18" fill="white" opacity="0.85"/>
  <circle cx="360" cy="200" r="10" fill="url(#bg)"/>
  <!-- Connection lines -->
  <line x1="256" y1="142" x2="256" y2="186" stroke="white" stroke-width="5" opacity="0.7" stroke-linecap="round"/>
  <line x1="236" y1="252" x2="186" y2="302" stroke="white" stroke-width="5" opacity="0.7" stroke-linecap="round"/>
  <line x1="276" y1="252" x2="326" y2="302" stroke="white" stroke-width="5" opacity="0.7" stroke-linecap="round"/>
  <line x1="170" y1="200" x2="212" y2="218" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="342" y1="200" x2="300" y2="218" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="164" y1="214" x2="168" y2="298" stroke="white" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <line x1="348" y1="214" x2="344" y2="298" stroke="white" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <!-- Sparkle accent on central node -->
  <circle cx="268" cy="218" r="6" fill="white" opacity="0.8"/>
  <!-- Arrow/journey indicator at bottom -->
  <path d="M200 390 L256 420 L312 390" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M220 360 L256 390 L292 360" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
</svg>
