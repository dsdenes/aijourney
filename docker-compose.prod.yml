services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      APP_URL: "https://${CLOUDFRONT_DOMAIN}"
      API_URL: "https://${CLOUDFRONT_DOMAIN}/api"
      ALLOWED_EMAIL_DOMAIN: mito.hu
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      KB_BUILDER_URL: "http://localhost:3002"

  worker:
    build:
      context: .
      target: worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: "${OPENAI_API_KEY}"

  kb-builder:
    build:
      context: .
      target: kb-builder
    restart: always
    environment:
      NODE_ENV: production
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      KB_BUILDER_PORT: "3002"

volumes:
  redis_data:
