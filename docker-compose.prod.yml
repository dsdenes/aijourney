services:
  mongodb:
    image: mongo:8
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      MONGODB_URI: "mongodb://mongodb:27017"
      APP_URL: "https://${CLOUDFRONT_DOMAIN}"
      API_URL: "https://${CLOUDFRONT_DOMAIN}/api"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      KB_BUILDER_URL: "http://kb-builder:3002"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      STRIPE_PRO_PRICE_ID: "${STRIPE_PRO_PRICE_ID}"
      STRIPE_ENTERPRISE_PRICE_ID: "${STRIPE_ENTERPRISE_PRICE_ID}"
      STRIPE_LLM_PACK_PRICE_ID: "${STRIPE_LLM_PACK_PRICE_ID}"

  worker:
    build:
      context: .
      target: worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: "${OPENAI_API_KEY}"

  kb-builder:
    build:
      context: .
      target: kb-builder
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MONGODB_URI: "mongodb://mongodb:27017"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      KB_BUILDER_PORT: "3002"
      PINECONE_API_KEY: "${PINECONE_API_KEY}"
      PINECONE_INDEX_NAME: "${PINECONE_INDEX_NAME:-aijourney-kb}"

volumes:
  mongo_data:
  redis_data:
