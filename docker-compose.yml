services:
  # ---------- Infrastructure ----------
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Init: seed DynamoDB tables ----------
  seed-db:
    build:
      context: .
      target: seed
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: eu-central-1

  # ---------- Application services ----------
  api:
    build:
      context: .
      target: api
    ports:
      - "3000:3000"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed-db:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: "3000"
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: eu-central-1
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:5173
      API_URL: http://localhost:3000
      KB_BUILDER_URL: http://kb-builder:3002
      ALLOWED_EMAIL_DOMAIN: mito.hu

  worker:
    build:
      context: .
      target: worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379

  kb-builder:
    build:
      context: .
      target: kb-builder
    ports:
      - "3002:3002"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      NODE_ENV: development
      KB_BUILDER_PORT: "3002"
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: eu-central-1

  web:
    build:
      context: .
      target: web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  redis_data:
  qdrant_data:
