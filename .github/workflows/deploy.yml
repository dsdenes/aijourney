name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux, aijourney]
    env:
      DEPLOY_PATH: /opt/aijourney
    steps:
      - name: Pull latest code
        run: |
          cd $DEPLOY_PATH
          git fetch origin
          git reset --hard origin/main
          echo "Deployed commit:"
          git log --oneline -1

      - name: Write .env file
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          cd $DEPLOY_PATH
          cat > .env <<EOF
          OPENAI_API_KEY=${OPENAI_API_KEY}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          EOF

      - name: Build Docker images
        run: |
          cd $DEPLOY_PATH
          docker compose -f docker-compose.server.yml build

      - name: Restart services
        run: |
          cd $DEPLOY_PATH
          docker compose -f docker-compose.server.yml up -d --force-recreate --remove-orphans

      - name: Verify deployment
        run: |
          cd $DEPLOY_PATH
          echo "=== Container Status ==="
          docker compose -f docker-compose.server.yml ps
          echo ""
          echo "=== Health Check ==="
          sleep 15
          curl -sf http://localhost:3000/api/health && echo "" || echo "Health check pending (may need more time)"
          echo ""
          echo "Commit $(git rev-parse --short HEAD) deployed successfully"
