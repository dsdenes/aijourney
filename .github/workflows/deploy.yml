name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux, aijourney]
    env:
      DEPLOY_PATH: /opt/aijourney
    steps:
      - name: Pull latest code
        run: |
          cd $DEPLOY_PATH
          git fetch origin
          git reset --hard origin/main
          echo "Deployed commit:"
          git log --oneline -1

      - name: Write .env file
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_ISSUER: ${{ secrets.COGNITO_ISSUER }}
        run: |
          cd $DEPLOY_PATH
          cat > .env <<EOF
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
          COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
          COGNITO_DOMAIN=${COGNITO_DOMAIN}
          COGNITO_ISSUER=${COGNITO_ISSUER}
          EOF

      - name: Build Docker images
        run: |
          cd $DEPLOY_PATH
          docker compose -f docker-compose.server.yml build

      - name: Restart services
        run: |
          cd $DEPLOY_PATH
          docker compose -f docker-compose.server.yml up -d --force-recreate --remove-orphans

      - name: Verify deployment
        run: |
          cd $DEPLOY_PATH
          echo "=== Container Status ==="
          docker compose -f docker-compose.server.yml ps
          echo ""
          echo "=== Health Check ==="
          sleep 15
          curl -sf http://localhost:3000/api/health && echo "" || echo "Health check pending (may need more time)"
          echo ""
          echo "Commit $(git rev-parse --short HEAD) deployed successfully"
