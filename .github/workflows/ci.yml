name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm format:check
      - run: pnpm lint
        continue-on-error: true

  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/shared test -- --coverage

  test-api:
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DYNAMODB_ENDPOINT: http://localhost:8000
      REDIS_URL: redis://localhost:6379
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: fakeAccessKeyId
      AWS_SECRET_ACCESS_KEY: fakeSecretAccessKey
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/api test -- --coverage

  test-worker:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/worker test -- --coverage

  test-kb-builder:
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    env:
      DYNAMODB_ENDPOINT: http://localhost:8000
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: fakeAccessKeyId
      AWS_SECRET_ACCESS_KEY: fakeSecretAccessKey
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/kb-builder test -- --coverage

  build-check:
    runs-on: ubuntu-latest
    needs: [lint, test-shared, test-api, test-worker, test-kb-builder]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
