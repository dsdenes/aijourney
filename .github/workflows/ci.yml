name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm format:check
      - run: pnpm lint

  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/shared test -- --coverage

  test-api:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/api test -- --coverage

  test-worker:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/worker test -- --coverage

  test-kb-builder:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aijourney/shared build
      - run: pnpm --filter @aijourney/kb-builder test -- --coverage

  build-check:
    runs-on: ubuntu-latest
    needs: [lint, test-shared, test-api, test-worker, test-kb-builder]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  deploy:
    runs-on: [self-hosted, linux, aijourney]
    needs: [build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    env:
      PRIMARY_DEPLOY_PATH: /opt/aijourney
      FALLBACK_DEPLOY_PATH: /home/gha/aijourney-deploy
      COMPOSE_PROJECT_NAME: aijourney
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deployment directory
        id: resolve-deploy-path
        shell: bash
        run: |
          set -euo pipefail

          if mkdir -p "$PRIMARY_DEPLOY_PATH" 2>/dev/null && [[ -w "$PRIMARY_DEPLOY_PATH" ]]; then
            deploy_path="$PRIMARY_DEPLOY_PATH"
          else
            mkdir -p "$FALLBACK_DEPLOY_PATH"
            deploy_path="$FALLBACK_DEPLOY_PATH"
          fi

          echo "Using deploy path: $deploy_path"
          echo "deploy_path=$deploy_path" >> "$GITHUB_OUTPUT"

      - name: Sync release to host path
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"

          if command -v rsync >/dev/null 2>&1; then
            rsync -a --delete \
              --exclude='.git/' \
              --exclude='node_modules/' \
              --exclude='coverage/' \
              --exclude='.pnpm-store/' \
              "$GITHUB_WORKSPACE/" "$deploy_path/"
          else
            find "$deploy_path" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='coverage' \
              --exclude='.pnpm-store' \
              -cf - . | tar -xf - -C "$deploy_path"
          fi

      - name: Write .env file
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"

            printf '%s\n' \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
              "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
              "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" \
              "GEMINI_API_KEY=${GEMINI_API_KEY}" \
              "GROK_API_KEY=${GROK_API_KEY}" \
              "PINECONE_API_KEY=${PINECONE_API_KEY}" \
              "PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-aijourney-kb}" \
              "SMTP_HOST=${SMTP_HOST:-smtp.tem.scaleway.com}" \
              "SMTP_PORT=${SMTP_PORT:-587}" \
              "SMTP_SECURE=${SMTP_SECURE:-false}" \
              "SMTP_USER=${SMTP_USER}" \
              "SMTP_PASS=${SMTP_PASS}" \
              "SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}" \
              "SMTP_FROM_NAME=${SMTP_FROM_NAME:-AI Journey}" \
              > "$deploy_path/.env"

      - name: Validate Docker Compose configuration
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"
          cd "$deploy_path"
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml config >/dev/null

      - name: Build Docker images
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"
          cd "$deploy_path"
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml build

      - name: Restart services
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"
          cd "$deploy_path"
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml up -d --force-recreate --remove-orphans

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"
          cd "$deploy_path"
          # Wait for MongoDB to be healthy
          for attempt in {1..12}; do
            if docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml exec -T mongodb mongosh --eval "db.runCommand('ping').ok" --quiet 2>/dev/null; then
              break
            fi
            echo "Waiting for MongoDB... attempt $attempt/12"
            sleep 5
          done
          # Run demo tenant migration + index seeding
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml exec -T api node -e "
            const { MongoClient } = require('mongodb');
            (async () => {
              const client = new MongoClient('mongodb://mongodb:27017');
              await client.connect();
              const db = client.db('aijourney');
              const tenantsCol = db.collection('tenants');
              const usersCol = db.collection('users');
              const DEMO_SLUG = 'demo';
              let demo = await tenantsCol.findOne({ slug: DEMO_SLUG });
              if (!demo) {
                const now = new Date().toISOString();
                const id = Date.now().toString(36) + Array.from({length:16}, () => Math.floor(Math.random()*36).toString(36)).join('');
                demo = { _id: id, id, name: 'Demo', slug: DEMO_SLUG, plan: 'free', settings: {}, quotas: { maxUsers: 3, maxLlmCallsPerMonth: 100, additionalLlmCalls: 0 }, usage: { currentPeriodStart: now, llmCallsUsed: 0, lastResetAt: now }, createdAt: now, updatedAt: now };
                await tenantsCol.insertOne(demo);
                console.log('Created Demo tenant:', id);
              } else { console.log('Demo tenant exists:', demo.id || demo._id); }
              const demoId = demo.id || demo._id;
              const users = await usersCol.find({}).toArray();
              for (const u of users) {
                const updates = {};
                if (!u.tenantId || u.tenantId !== demoId) updates.tenantId = demoId;
                if (!u.orgRole) updates.orgRole = (u.email||'').toLowerCase() === 'dsdenes@gmail.com' ? 'owner' : 'member';
                if ((u.email||'').toLowerCase() === 'dsdenes@gmail.com' && u.globalRole !== 'superadmin') updates.globalRole = 'superadmin';
                if (Object.keys(updates).length > 0) {
                  await usersCol.updateOne({ _id: u._id }, { \$set: updates });
                  console.log('Updated', u.email, JSON.stringify(updates));
                }
              }
              console.log('Migration complete');
              await client.close();
            })().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail
          deploy_path="${{ steps.resolve-deploy-path.outputs.deploy_path }}"
          cd "$deploy_path"

          echo "=== Container Status ==="
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml ps
          echo ""
          echo "=== Health Check ==="

          for attempt in {1..12}; do
            if curl -fsS http://localhost:3000/api/health/ready; then
              echo ""
              echo "Commit $GITHUB_SHA deployed successfully"
              exit 0
            fi

            echo "Health check attempt $attempt/12 failed; retrying in 5s"
            sleep 5
          done

          echo "Deployment did not become healthy in time. Recent logs:"
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.server.yml logs --tail=100 api web worker kb-builder
          exit 1
