# =============================================================================
# GitLab CI/CD Pipeline — Mito AI Journey
# =============================================================================
# Stages: lint → test → build → security → package → deploy
# =============================================================================

variables:
  NODE_IMAGE: node:24-alpine
  DOCKER_IMAGE: docker:28
  AWS_REGION: eu-central-1
  REGISTRY: gitlab-registry.mito.hu/815labs/mito-ai-journey
  PNPM_VERSION: "9.15.4"

stages:
  - lint
  - test
  - build
  - security
  - package
  - deploy

# ---------------------------------------------------------------------------
# Cache: reuse pnpm store across jobs
# ---------------------------------------------------------------------------
.pnpm-setup: &pnpm-setup
  image: $NODE_IMAGE
  before_script:
    - corepack enable
    - corepack prepare pnpm@$PNPM_VERSION --activate
    - pnpm install --frozen-lockfile
    - pnpm --filter @aijourney/shared build
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

# ===========================================================================
# Stage: lint
# ===========================================================================

format:check:
  <<: *pnpm-setup
  stage: lint
  script:
    - pnpm format:check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

lint:
  <<: *pnpm-setup
  stage: lint
  script:
    - pnpm lint
  allow_failure: true   # until ESLint is configured in all packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ===========================================================================
# Stage: test
# ===========================================================================

test:shared:
  <<: *pnpm-setup
  stage: test
  script:
    - pnpm --filter @aijourney/shared test -- --coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: packages/shared/coverage/clover.xml
    paths:
      - packages/shared/coverage/
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\|\s*([\d.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:api:
  <<: *pnpm-setup
  stage: test
  services:
    - name: amazon/dynamodb-local:latest
      alias: dynamodb-local
    - name: redis:7-alpine
      alias: redis
  variables:
    DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    REDIS_URL: redis://redis:6379
    AWS_REGION: eu-central-1
    AWS_ACCESS_KEY_ID: fakeAccessKeyId
    AWS_SECRET_ACCESS_KEY: fakeSecretAccessKey
  script:
    - pnpm --filter @aijourney/api test -- --coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/api/coverage/clover.xml
    paths:
      - services/api/coverage/
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\|\s*([\d.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:worker:
  <<: *pnpm-setup
  stage: test
  services:
    - name: redis:7-alpine
      alias: redis
  variables:
    REDIS_URL: redis://redis:6379
  script:
    - pnpm --filter @aijourney/worker test -- --coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/worker/coverage/clover.xml
    paths:
      - services/worker/coverage/
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\|\s*([\d.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:kb-builder:
  <<: *pnpm-setup
  stage: test
  services:
    - name: amazon/dynamodb-local:latest
      alias: dynamodb-local
  variables:
    DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    AWS_REGION: eu-central-1
    AWS_ACCESS_KEY_ID: fakeAccessKeyId
    AWS_SECRET_ACCESS_KEY: fakeSecretAccessKey
  script:
    - pnpm --filter @aijourney/kb-builder test -- --coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/kb-builder/coverage/clover.xml
    paths:
      - services/kb-builder/coverage/
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\|\s*([\d.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ===========================================================================
# Stage: build
# ===========================================================================

build:check:
  <<: *pnpm-setup
  stage: build
  script:
    - pnpm build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ===========================================================================
# Stage: security
# ===========================================================================

sast:
  stage: security
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

# ===========================================================================
# Stage: package — Build & push Docker images
# ===========================================================================

.docker-build:
  stage: package
  image: $DOCKER_IMAGE
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

package:api:
  extends: .docker-build
  script:
    - docker build --target api -t $REGISTRY/api:$CI_COMMIT_SHA -t $REGISTRY/api:latest .
    - docker push $REGISTRY/api:$CI_COMMIT_SHA
    - docker push $REGISTRY/api:latest

package:worker:
  extends: .docker-build
  script:
    - docker build --target worker -t $REGISTRY/worker:$CI_COMMIT_SHA -t $REGISTRY/worker:latest .
    - docker push $REGISTRY/worker:$CI_COMMIT_SHA
    - docker push $REGISTRY/worker:latest

package:kb-builder:
  extends: .docker-build
  script:
    - docker build --target kb-builder -t $REGISTRY/kb-builder:$CI_COMMIT_SHA -t $REGISTRY/kb-builder:latest .
    - docker push $REGISTRY/kb-builder:$CI_COMMIT_SHA
    - docker push $REGISTRY/kb-builder:latest

package:web:
  extends: .docker-build
  script:
    - docker build --target web -t $REGISTRY/web:$CI_COMMIT_SHA -t $REGISTRY/web:latest .
    - docker push $REGISTRY/web:$CI_COMMIT_SHA
    - docker push $REGISTRY/web:latest

# ===========================================================================
# Stage: deploy — AWS Lightsail + S3/CloudFront
# ===========================================================================

deploy:api:
  stage: deploy
  image: amazon/aws-cli:latest
  variables:
    AWS_DEFAULT_REGION: $AWS_REGION
  before_script:
    - yum install -y jq
  script:
    - |
      echo "Pushing API image to Lightsail..."
      # Note: In Lightsail, we use the GitLab registry images directly
      # via the container definitions. The images are tagged with the commit SHA.

      echo "Deploying all containers to Lightsail..."
      CONTAINERS=$(cat <<EOJSON
      {
        "api": {
          "image": "$REGISTRY/api:$CI_COMMIT_SHA",
          "ports": {"3000": "HTTP"},
          "environment": {
            "NODE_ENV": "production",
            "PORT": "3000",
            "AWS_REGION": "$AWS_REGION",
            "AWS_ACCESS_KEY_ID": "$AWS_ACCESS_KEY_ID",
            "AWS_SECRET_ACCESS_KEY": "$AWS_SECRET_ACCESS_KEY",
            "ALLOWED_EMAIL_DOMAIN": "mito.hu",
            "RAG_PROVIDER": "bedrock",
            "REDIS_URL": "redis://localhost:6379",
            "KB_BUILDER_URL": "http://localhost:3002",
            "OPENAI_API_KEY": "$OPENAI_API_KEY",
            "COGNITO_USER_POOL_ID": "$COGNITO_USER_POOL_ID",
            "COGNITO_CLIENT_ID": "$COGNITO_CLIENT_ID",
            "COGNITO_CLIENT_SECRET": "$COGNITO_CLIENT_SECRET",
            "COGNITO_DOMAIN": "$COGNITO_DOMAIN",
            "COGNITO_ISSUER": "$COGNITO_ISSUER",
            "APP_URL": "$APP_URL",
            "API_URL": "$API_URL"
          }
        },
        "redis": {
          "image": "redis:7-alpine"
        },
        "worker": {
          "image": "$REGISTRY/worker:$CI_COMMIT_SHA",
          "environment": {
            "NODE_ENV": "production",
            "AWS_REGION": "$AWS_REGION",
            "AWS_ACCESS_KEY_ID": "$AWS_ACCESS_KEY_ID",
            "AWS_SECRET_ACCESS_KEY": "$AWS_SECRET_ACCESS_KEY",
            "REDIS_URL": "redis://localhost:6379",
            "OPENAI_API_KEY": "$OPENAI_API_KEY"
          }
        },
        "kb-builder": {
          "image": "$REGISTRY/kb-builder:$CI_COMMIT_SHA",
          "environment": {
            "NODE_ENV": "production",
            "AWS_REGION": "$AWS_REGION",
            "AWS_ACCESS_KEY_ID": "$AWS_ACCESS_KEY_ID",
            "AWS_SECRET_ACCESS_KEY": "$AWS_SECRET_ACCESS_KEY",
            "OPENAI_API_KEY": "$OPENAI_API_KEY",
            "KB_BUILDER_PORT": "3002"
          }
        }
      }
      EOJSON
      )

      ENDPOINT='{"containerName":"api","containerPort":3000,"healthCheck":{"path":"/api/health","successCodes":"200","healthyThreshold":2,"unhealthyThreshold":5,"timeoutSeconds":5,"intervalSeconds":10}}'

      aws lightsail create-container-service-deployment \
        --service-name aijourney \
        --containers "$CONTAINERS" \
        --public-endpoint "$ENDPOINT" \
        --no-cli-pager || echo "Lightsail deploy failed"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: https://aijourney.mito.hu

deploy:frontend:
  stage: deploy
  image: $NODE_IMAGE
  before_script:
    - apk add --no-cache aws-cli
  script:
    - corepack enable
    - corepack prepare pnpm@$PNPM_VERSION --activate
    - pnpm install --frozen-lockfile
    - pnpm --filter @aijourney/shared build
    - pnpm --filter @aijourney/web build
    - aws s3 sync apps/web/build/ s3://aijourney-frontend/ --delete
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
  variables:
    CLOUDFRONT_DISTRIBUTION_ID: ESYQ3VUREOLFY
    PUBLIC_API_BASE: https://aijourney.7xt36yf38b6r2.eu-central-1.cs.amazonlightsail.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  environment:
    name: production
    url: https://d2th8ux1aiqw4z.cloudfront.net

# ===========================================================================
# Smoke test — basic health check after deploy
# ===========================================================================

smoke:test:
  stage: deploy
  image: curlimages/curl:latest
  needs:
    - deploy:api
  script:
    - |
      echo "Running smoke test..."
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aijourney.7xt36yf38b6r2.eu-central-1.cs.amazonlightsail.com/health)
      echo "Health check returned: $HTTP_STATUS"
      [ "$HTTP_STATUS" = "200" ] || exit 1
      echo "Smoke test passed!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
