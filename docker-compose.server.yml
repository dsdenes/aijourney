# docker-compose.server.yml — Production deployment on Scaleway (ai.1p.hu)
# Usage: docker compose -f docker-compose.server.yml up -d --build

services:
  # ---------- API ----------
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3000'
      MONGODB_URI: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      APP_URL: 'https://ai.1p.hu'
      API_URL: 'https://ai.1p.hu/api'
      GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID}'
      GOOGLE_CLIENT_SECRET: '${GOOGLE_CLIENT_SECRET}'
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      STRIPE_SECRET_KEY: '${STRIPE_SECRET_KEY}'
      STRIPE_WEBHOOK_SECRET: '${STRIPE_WEBHOOK_SECRET:-}'
      STRIPE_PRO_PRICE_ID: '${STRIPE_PRO_PRICE_ID:-}'
      STRIPE_ENTERPRISE_PRICE_ID: '${STRIPE_ENTERPRISE_PRICE_ID:-}'
      STRIPE_LLM_PACK_PRICE_ID: '${STRIPE_LLM_PACK_PRICE_ID:-}'
      GEMINI_API_KEY: '${GEMINI_API_KEY}'
      GROK_API_KEY: '${GROK_API_KEY}'
      SMTP_HOST: '${SMTP_HOST:-smtp.tem.scaleway.com}'
      SMTP_PORT: '${SMTP_PORT:-587}'
      SMTP_SECURE: '${SMTP_SECURE:-false}'
      SMTP_USER: '${SMTP_USER}'
      SMTP_PASS: '${SMTP_PASS}'
      SMTP_FROM_EMAIL: '${SMTP_FROM_EMAIL}'
      SMTP_FROM_NAME: '${SMTP_FROM_NAME:-AI Journey}'
      KB_BUILDER_URL: 'http://kb-builder:3002'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- Frontend ----------
  web:
    build:
      context: .
      target: web
      args:
        VITE_GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID}'
    restart: unless-stopped
    ports:
      - '5173:80'

  # ---------- Worker ----------
  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      MONGODB_URI: mongodb://mongodb:27017

  # ---------- KB Builder ----------
  kb-builder:
    build:
      context: .
      target: kb-builder
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=3072'
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      KB_BUILDER_PORT: '3002'
      MONGODB_URI: mongodb://mongodb:27017
      PINECONE_API_KEY: '${PINECONE_API_KEY}'
      PINECONE_INDEX_NAME: '${PINECONE_INDEX_NAME:-aijourney-kb}'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- Infrastructure ----------
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: aijourney
    command: ['mongod', '--wiredTigerCacheSizeGB', '0.5']
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.runCommand('ping').ok", '--quiet']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
  redis_data:
